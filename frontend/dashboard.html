<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SaaS AI</title>
    <!-- CSS base -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- CSS do dashboard -->
    <link rel="stylesheet" href="css/dashboard.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">SaaS AI</div>
        <ul class="nav-links">
            <li><a href="/index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="/chat.html">Chat</a></li>
            <li><a href="/planos.html">Planos</a></li>
            <li><a href="/perfil.html">Perfil</a></li>
            <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Sair</a></li>
        </ul>
        <div class="hamburger">☰</div>
    </nav>

    <main class="dashboard">
        <div class="dashboard-header">
            <h1>Dashboard</h1>
            <div class="user-greeting">
                <i class="fas fa-user-circle"></i> Olá, <span id="userName"></span>!
            </div>
        </div>

        <!-- Cards de estatísticas -->
        <div class="cards">
            <div class="card">
                <div class="card-icon"><i class="fas fa-crown"></i></div>
                <h3>Plano Atual</h3>
                <p id="currentPlan">Carregando...</p>
                <div id="planStatus" class="plan-status"></div>
            </div>
            <div class="card">
                <div class="card-icon"><i class="fas fa-comment-dots"></i></div>
                <h3>Mensagens</h3>
                <p id="messageCount">0</p>
            </div>
            <div class="card">
                <div class="card-icon"><i class="fas fa-file-alt"></i></div>
                <h3>Arquivos</h3>
                <p id="fileCount">0</p>
            </div>
        </div>

        <!-- Mini gráfico decorativo -->
        <div class="mini-chart">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <!-- Histórico de transações -->
        <div class="transactions-section">
            <h2><i class="fas fa-history"></i> Histórico de Transações</h2>
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Plano</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Preenchido via JS -->
                </tbody>
            </table>
        </div>

        <!-- Botão destacado para o chat -->
        <div class="chat-button-container">
            <a href="/chat.html" class="btn-chat">
                <i class="fas fa-comment-dots"></i> Ir para o Chat
            </a>
        </div>
    </main>

    <!-- Área de depuração para diagnóstico -->
    <div id="debug-info" style="background: #333; color: lime; padding: 10px; margin-top: 20px; border-radius: 8px; font-family: monospace; white-space: pre-wrap;">
        Aguardando dados...
    </div>

    <!-- Scripts principais -->
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/dashboard.js"></script>

    <script>
        // Menu hambúrguer
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('active');
                });
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>
</body>
</html>
