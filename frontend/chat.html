
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - SaaS AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/chat.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Biblioteca marked para interpretar Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Biblioteca DOMPurify para sanitizar HTML (segurança) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.4/purify.min.js"></script>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SaaS AI</div>
        <ul class="nav-links">
            <li><a href="/dashboard.html">Dashboard</a></li>
            <li><a href="/planos.html">Planos</a></li>
            <li><a href="#" id="logoutBtn">Sair</a></li>
        </ul>
        <div class="hamburger">☰</div>
    </nav>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-avatar">
                <i class="fas fa-robot"></i>
            </div>
            <div class="chat-title">
                <h2>Assistente Virtual</h2>
                <span class="status online"><i class="fas fa-circle"></i> Online</span>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <!-- Mensagens serão inseridas aqui dinamicamente -->
        </div>

        <!-- Indicador de digitação (invisível por padrão) -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autofocus>
            <label for="fileInput" class="file-label">
                <i class="fas fa-paperclip"></i>
            </label>
            <input type="file" id="fileInput" multiple style="display: none;">
            <button id="sendBtn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
        <div id="filePreview" class="file-preview"></div>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/chat.js"></script>
    <!-- Script do menu hambúrguer -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('active');
                });
                navLinks.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>
</body>
</html>
