<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - SaaS AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- marked, DOMPurify, highlight.js (mantenha) -->
</head>
<body>
    <nav class="navbar">
        <div class="logo">SaaS AI</div>
        <ul class="nav-links">
            <li><a href="/dashboard.html">Dashboard</a></li>
            <li><a href="/planos.html">Planos</a></li>
            <li><a href="#" id="logoutBtn">Sair</a></li>
        </ul>
        <div class="hamburger">☰</div>
    </nav>

    <div class="chat-layout">
        <!-- Sidebar de conversas -->
        <aside class="conversation-sidebar">
            <div class="sidebar-header">
                <h3>Conversas</h3>
                <button id="newConversationBtn" class="btn-new-conv">
                    <i class="fas fa-plus"></i> Nova
                </button>
            </div>
            <div class="conversation-list" id="conversationList">
                <!-- Lista será populada via JS -->
            </div>
        </aside>

        <!-- Área principal do chat -->
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-avatar"><i class="fas fa-robot"></i></div>
                <div class="chat-title">
                    <h2 id="currentConversationTitle">Assistente Virtual</h2>
                    <span class="status online"><i class="fas fa-circle"></i> Online</span>
                </div>
                <button id="deleteConversationBtn" class="btn-delete-conv" title="Excluir conversa" style="display: none;">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>

            <div class="chat-messages" id="chatMessages"></div>
            <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Digite sua mensagem..." autofocus>
                <label for="fileInput" class="file-label"><i class="fas fa-paperclip"></i></label>
                <input type="file" id="fileInput" multiple style="display: none;">
                <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div id="filePreview" class="file-preview"></div>
        </div>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/chat.js"></script>
    <!-- script do menu hambúrguer (mantenha) -->
</body>
</html>
