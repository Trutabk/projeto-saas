<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - SaaS AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reset específico para a página de perfil */
        body {
            background: #0a0a1a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .profile-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 2rem;
            background: rgba(20, 20, 40, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }

        .profile-info h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .profile-info p {
            color: #cccccc;
            margin: 0.2rem 0;
        }

        .plan-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            background: rgba(0, 184, 148, 0.2);
            border: 1px solid #00b894;
            border-radius: 50px;
            color: #00b894;
            font-weight: 600;
            margin-top: 0.5rem;
        }

        .profile-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 600;
            color: #a5b1ff;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .form-group input {
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #a5b1ff;
            outline: none;
            box-shadow: 0 0 15px rgba(165, 177, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
        }

        .form-group input[readonly] {
            background: rgba(255, 255, 255, 0.05);
            color: #dddddd;
            cursor: not-allowed;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-save {
            padding: 1rem;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(108, 92, 231, 0.4);
        }

        /* Ajustes para navbar (caso necessário) */
        .navbar {
            background: rgba(10, 10, 20, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar a {
            color: #ffffff;
        }

        .navbar a:hover {
            color: #a5b1ff;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">SaaS AI</div>
        <ul class="nav-links">
            <li><a href="/dashboard.html">Dashboard</a></li>
            <li><a href="/chat.html">Chat</a></li>
            <li><a href="/planos.html">Planos</a></li>
            <li><a href="/perfil.html" class="active">Perfil</a></li>
            <li><a href="#" id="logoutBtn">Sair</a></li>
        </ul>
        <div class="hamburger">☰</div>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-info">
                <h1 id="userName">Carregando...</h1>
                <p id="userEmail"></p>
                <span class="plan-badge" id="userPlan">Plano Bronze</span>
            </div>
        </div>

        <form class="profile-form" id="profileForm">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Nome completo</label>
                <input type="text" id="nameInput" placeholder="Seu nome" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> E-mail</label>
                <input type="email" id="emailInput" readonly>
            </div>
            <div class="form-group">
                <label><i class="fas fa-phone"></i> Telefone</label>
                <input type="tel" id="phoneInput" placeholder="Telefone (opcional)">
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Nova senha (deixe em branco para não alterar)</label>
                <input type="password" id="passwordInput" placeholder="Nova senha">
            </div>
            <button type="submit" class="btn-save">
                <i class="fas fa-save"></i> Salvar alterações
            </button>
        </form>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { apiRequest } from './js/api.js';

        async function loadProfile() {
            try {
                const user = await apiRequest('/user/profile');
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('nameInput').value = user.name;
                document.getElementById('emailInput').value = user.email;
                document.getElementById('phoneInput').value = user.phone || '';
                
                // Capitaliza o nome do plano
                const plan = user.plan?.type || 'bronze';
                document.getElementById('userPlan').textContent = `Plano ${plan.charAt(0).toUpperCase() + plan.slice(1)}`;
            } catch (error) {
                console.error('Erro ao carregar perfil:', error);
                alert('Erro ao carregar dados. Faça login novamente.');
                window.location.href = '/login.html';
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('nameInput').value;
            const phone = document.getElementById('phoneInput').value;
            const password = document.getElementById('passwordInput').value;

            const data = { name, phone };
            if (password.trim()) {
                data.password = password;
            }

            try {
                const updated = await apiRequest('/user/profile', 'PUT', data);
                alert('Perfil atualizado com sucesso!');
                document.getElementById('userName').textContent = updated.name;
                document.getElementById('emailInput').value = updated.email;
                document.getElementById('phoneInput').value = updated.phone || '';
                document.getElementById('passwordInput').value = '';
            } catch (error) {
                alert('Erro ao atualizar: ' + error.message);
            }
        });

        loadProfile();

        // Menu hambúrguer
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');
            if (hamburger && navLinks) {
                hamburger.addEventListener('click', () => {
                    navLinks.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
