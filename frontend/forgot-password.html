<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | SaaS AI</title>
    <!-- CSS base -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Ajustes específicos para a página de recuperação */
        .auth-container {
            position: relative;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
        }
        .auth-container::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            animation: pulseGlow 8s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        /* Partículas flutuantes */
        .particle {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            pointer-events: none;
            animation: floatParticle 20s linear infinite;
        }
        .particle:nth-child(1) { width: 80px; height: 80px; top: 10%; left: 5%; animation-duration: 25s; }
        .particle:nth-child(2) { width: 120px; height: 120px; top: 70%; left: 85%; animation-duration: 30s; }
        .particle:nth-child(3) { width: 60px; height: 60px; top: 40%; left: 20%; animation-duration: 18s; }
        .particle:nth-child(4) { width: 100px; height: 100px; top: 80%; left: 10%; animation-duration: 22s; }
        .particle:nth-child(5) { width: 150px; height: 150px; top: 20%; left: 80%; animation-duration: 35s; }
        @keyframes floatParticle {
            from { transform: translateY(0) rotate(0deg); }
            to { transform: translateY(-200px) rotate(360deg); }
        }
        /* Ícones flutuantes */
        .floating-icon {
            position: absolute;
            font-size: 2rem;
            color: rgba(255,255,255,0.2);
            z-index: 1;
            animation: floatIcon 10s linear infinite;
        }
        @keyframes floatIcon {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }
        /* Formulário */
        .auth-container form {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1) inset;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .auth-container form:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 55px rgba(0,0,0,0.4), 0 0 0 2px rgba(255,255,255,0.2) inset;
        }
        .auth-container h2 {
            background: linear-gradient(135deg, #fff, #a5b1ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
        }
        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.7);
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }
        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 1.2rem;
            transition: color 0.3s;
            z-index: 1;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50px;
            font-size: 1rem;
            color: white;
            transition: all 0.3s;
        }
        .input-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .input-group input:focus {
            border-color: #a5b1ff;
            background: rgba(255,255,255,0.15);
            outline: none;
            box-shadow: 0 0 20px rgba(165,177,255,0.3);
        }
        .input-group input:focus + i {
            color: #a5b1ff;
        }
        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #a5b1ff, #5f9ea0);
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(165,177,255,0.4);
        }
        .auth-links {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.7);
        }
        .auth-links a {
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.3s;
        }
        .auth-links a:hover {
            color: #a5b1ff;
        }
        .message {
            text-align: center;
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 50px;
            display: none;
        }
        .message.success {
            background: rgba(0,184,148,0.2);
            color: #00b894;
            border: 1px solid #00b894;
        }
        .message.error {
            background: rgba(214,48,49,0.2);
            color: #d63031;
            border: 1px solid #d63031;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <!-- Partículas flutuantes -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <!-- Ícones flutuantes -->
        <i class="fas fa-key floating-icon" style="top: 15%; left: 10%; animation-duration: 18s;"></i>
        <i class="fas fa-lock floating-icon" style="top: 70%; left: 80%; animation-duration: 22s;"></i>
        <i class="fas fa-envelope floating-icon" style="top: 40%; left: 60%; animation-duration: 25s;"></i>
        <i class="fas fa-shield-alt floating-icon" style="top: 80%; left: 20%; animation-duration: 20s;"></i>

        <form id="forgotPasswordForm">
            <h2>🔐 Recuperar senha</h2>
            <p class="subtitle">Digite seu e-mail para receber um link de recuperação.</p>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Seu e-mail" required autofocus>
            </div>

            <button type="submit">
                <span>Enviar link</span>
                <i class="fas fa-paper-plane" style="margin-left: 10px;"></i>
            </button>

            <div id="responseMessage" class="message"></div>

            <p class="auth-links">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Voltar ao login</a>
            </p>
        </form>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module">
        import { apiRequest } from './js/api.js';

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('responseMessage');
            const submitBtn = document.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enviando...';

            try {
                const data = await apiRequest('/auth/forgot-password', 'POST', { email });
                messageDiv.className = 'message success';
                messageDiv.textContent = 'Link enviado! Verifique seu e-mail.';
                messageDiv.style.display = 'block';
                document.getElementById('email').value = '';
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = error.message;
                messageDiv.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
