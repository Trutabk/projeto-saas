<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - SaaS AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <form id="registerForm">
            <h2>Comece agora mesmo! 🚀</h2>
            <p class="subtitle">Já tem conta? <a href="login.html">Faça login</a></p>
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" placeholder="Nome completo" required autofocus>
            </div>
            
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="Telefone (opcional)">
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Senha (mínimo 6 caracteres)" required minlength="6">
            </div>
            
            <button type="submit">
                <span>Criar conta grátis</span>
                <i class="fas fa-arrow-right" style="margin-left: 10px;"></i>
            </button>
            
            <div class="benefits">
                <span><i class="fas fa-check-circle"></i> 7 dias grátis</span>
                <span><i class="fas fa-check-circle"></i> Sem compromisso</span>
                <span><i class="fas fa-check-circle"></i> Cancele a qualquer momento</span>
            </div>
            
            <p class="auth-links">
                Ao se registrar, você concorda com nossos <a href="#">Termos de Uso</a> e <a href="#">Política de Privacidade</a>.
            </p>
        </form>
    </div>

    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/auth.js"></script>
    <!-- Script opcional para validação -->
    <script>
        document.getElementById('password')?.addEventListener('input', function(e) {
            const strength = e.target.value.length;
            // Aqui você pode adicionar um indicador visual de força da senha
        });
    </script>
</body>
</html>
